apiVersion: v1
kind: ConfigMap
metadata:
  name: skillmetrix-web-content
data:
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>SkillMetrix Events</title>
      <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; font-family: Arial, sans-serif; color: #eef7f4; background: radial-gradient(circle at top right, #226d65, #102b31 55%, #09191d); }
        main { width: min(760px, 100%); padding: 56px; border: 1px solid #ffffff2b; border-radius: 28px; background: #ffffff12; box-shadow: 0 30px 80px #0006; backdrop-filter: blur(14px); }
        .tag { display: inline-block; padding: 8px 14px; border-radius: 999px; color: #102b31; background: #a7eed8; font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        h1 { margin: 25px 0 14px; font-size: clamp(44px, 8vw, 78px); line-height: .98; }
        p { max-width: 600px; margin: 0 0 34px; color: #c5ddd8; font-size: 18px; line-height: 1.65; }
        .details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .detail { padding: 18px; border-radius: 16px; background: #071b1f66; }
        small { display: block; margin-bottom: 7px; color: #77b9ac; font-weight: bold; text-transform: uppercase; }
        strong { font-size: 15px; }
        @media (max-width: 620px) { main { padding: 34px 24px; } .details { grid-template-columns: 1fr; } }
      </style>
    </head>
    <body>
      <main>
        <span class="tag">Kubernetes live</span>
        <h1>Build. Learn. Scale.</h1>
        <p>A simulated event landing page deployed with a ConfigMap, replicated Nginx Deployment, and ClusterIP Service.</p>
        <div class="details">
          <div class="detail"><small>Date</small><strong>28 August 2026</strong></div>
          <div class="detail"><small>Format</small><strong>Hands-on lab</strong></div>
          <div class="detail"><small>Replicas</small><strong>2 pods running</strong></div>
        </div>
      </main>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skillmetrix-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skillmetrix-web
  template:
    metadata:
      labels:
        app: skillmetrix-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: web-content
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: web-content
          configMap:
            name: skillmetrix-web-content
---
apiVersion: v1
kind: Service
metadata:
  name: skillmetrix-web
spec:
  selector:
    app: skillmetrix-web
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
